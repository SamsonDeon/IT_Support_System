<!DOCTYPE html>
<html>
<head>
    <title>Audit Logs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <strong>IT Enterprise Support</strong>
    <div>
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">
    <h2>System Audit Trail</h2>

    <table class="table">
        <tr>
            <th>Action</th>
            <th>Performed By</th>
            <th>Target</th>
            <th>Time</th>
        </tr>

        {% for log in logs %}
        <tr>
            <td>{{ log.action }}</td>
            <td>{{ log.performed_by }}</td>
            <td>{{ log.target_user }}</td>
            <td>{{ log.timestamp }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>IT Enterprise Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="sidebar">
    <h2>IT Enterprise</h2>
    <a href="/dashboard">Dashboard</a>
    <a href="/log_issue">Log Issue</a>
    <a href="/view_issues">View Issues</a>
    <a href="/audit_logs">Audit Trail</a>
    {% if session['role'] == 'Admin' %}
        <a href="/manage_users">Manage Users</a>
    {% endif %}
    <a href="/logout" class="logout">Logout</a>
</div>

<div class="main-content">

    <div class="topbar">
        <h2>Dashboard Overview</h2>
        <div class="user-info">
            Logged in as <strong>{{ session['user'] }}</strong>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-card total">
            <h3>Total Issues</h3>
            <p>{{ total }}</p>
        </div>

        <div class="stat-card open">
            <h3>Open Issues</h3>
            <p>{{ pending }}</p>
        </div>

        <div class="stat-card closed">
            <h3>Closed Issues</h3>
            <p>{{ solved }}</p>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="issueChart"></canvas>
    </div>

</div>

<script>
const ctx = document.getElementById('issueChart');

new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ['Open Issues', 'Closed Issues'],
        datasets: [{
            data: [{{ pending }}, {{ solved }}],
            backgroundColor: ['#ff4d4d', '#28a745']
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                position: 'bottom'
            }
        }
    }
});
</script>

</body>
</html>

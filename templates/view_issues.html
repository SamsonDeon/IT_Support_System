<!DOCTYPE html>
<html>
<head>
    <title>View Issues</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>All Issues</h2>

<a href="/dashboard">🏠 Dashboard</a>
<a href="/export_excel">📤 Export to Excel</a>

<hr>

<input type="text" id="searchInput" placeholder="Search issues..." style="width:300px; padding:8px;">

<hr>

<canvas id="statusChart" width="400" height="200"></canvas>

<script>
new Chart(document.getElementById("statusChart"), {
    type: 'pie',
    data: {
        labels: ['Open', 'Closed'],
        datasets: [{
            data: [{{ open_count }}, {{ closed_count }}],
            backgroundColor: ['orange', 'green']
        }]
    }
});
</script>

<hr>

<table border="1" width="100%">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Status</th>
        <th>Date</th>
    </tr>

    {% for issue in issues %}
    <tr>
        <td>{{ issue["id"] }}</td>
        <td>{{ issue["title"] }}</td>
        <td>{{ issue["description"] }}</td>
        <td>
            <a href="/update_status/{{ issue['id'] }}">
                {% if issue["status"] == "Open" %}
                    <span style="color:orange;">Open</span>
                {% else %}
                    <span style="color:green;">Closed</span>
                {% endif %}
            </a>
        </td>
        <td>{{ issue["date"] }}</td>
    </tr>
    {% endfor %}
</table>

<script>
document.getElementById("searchInput").addEventListener("keyup", function() {
    let value = this.value.toLowerCase();
    let rows = document.querySelectorAll("table tr");

    rows.forEach((row, index) => {
        if(index === 0) return;
        row.style.display = row.innerText.toLowerCase().includes(value)
            ? "" : "none";
    });
});
</script>

<script>
setTimeout(function(){
   location.reload();
}, 30000);
</script>

</body>
</html>

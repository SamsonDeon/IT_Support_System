<!DOCTYPE html>
<html>
<head>
<title>Manage Users</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
<strong>IT Enterprise Support</strong>

<div class="nav-right">
<a href="/dashboard">Dashboard</a>
<a href="/signup">Create User</a>
<a href="/logout">Logout</a>
</div>
</div>

<div class="container">

<h2>Manage Users</h2>

<table class="table">

<tr>
<th>ID</th>
<th>Username</th>
<th>Role</th>
</tr>

{% for user in users %}
<tr>
<td>{{ user.id }}</td>
<td>{{ user.username }}</td>
<td>{{ user.role }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
